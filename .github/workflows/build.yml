# Step 1 — verify the project compiles in CI.
#
# The Dockerfile is the single source of truth for the build toolchain
# (CUDA devel base, cmake, ninja, uv, nvcomp, scikit-build-core). It
# already runs `cmake configure` + `cmake --build` + the CPU subset of
# ctest as part of `docker build`, so a successful image build is a
# successful compile.
#
# Runs on the self-hosted runner because subsequent jobs (test.yml) want
# to reuse the locally cached image layers; nothing in this job needs a
# GPU.

name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Per-workflow group keyed by ref (see #66).
concurrency:
  group: gpu-runner-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: [self-hosted, gpu]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show docker version
        run: docker version

      - name: Build docker image
        # Tag with the SHA so test.yml can reuse the same image (the
        # local layer cache on the self-hosted runner makes this cheap
        # on cache hits). Also tag :ci-latest as a moving alias for ad
        # hoc inspection.
        run: |
          docker build \
            --tag damacy:${{ github.sha }} \
            --tag damacy:ci-latest \
            .
