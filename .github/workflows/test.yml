# Step 2 — run the full ctest suite (including the CUDA tests) and a
# Python import smoke test, both inside the Docker image produced by
# build.yml's recipe.
#
# The Dockerfile already runs the CPU subset of ctest during the image
# build; here we re-run ctest with `--gpus all` so test_damacy and
# test_assemble actually exercise the device. The Python smoke test
# confirms the editable install can resolve the `_native` extension.
#
# This job rebuilds the image rather than depending on build.yml because
# (a) GitHub-Actions doesn't share artifacts between workflows by
# default, and (b) the self-hosted runner's local docker layer cache
# makes the second build essentially free on a cache hit.

name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    # Self-hosted runner with a GPU and the nvidia-container-toolkit
    # configured so `docker run --gpus all` can attach the device.
    runs-on: [self-hosted, gpu]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build docker image
        run: |
          docker build --tag damacy:${{ github.sha }} .

      - name: Run ctest (with GPU)
        # All 7 tests; the two CUDA tests require the GPU. ctest exits
        # nonzero on any failure, which fails the step.
        run: |
          docker run --rm --gpus all \
            damacy:${{ github.sha }} \
            ctest --output-on-failure --test-dir build

      - name: Python import smoke test
        # Confirms the editable install + the prebuilt _native*.so are
        # resolvable, and that calling into the C extension works (not
        # just the import). set_log_quiet is a trivial no-op forward.
        run: |
          docker run --rm --gpus all \
            damacy:${{ github.sha }} \
            python3 -c "import damacy; print('damacy', damacy.__version__); damacy._native.set_log_quiet(True); print('api-ok')"
