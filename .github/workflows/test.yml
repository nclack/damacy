# Step 2 — run the full ctest suite (including the CUDA tests), a Python
# import smoke test, and produce/upload a coverage report.
#
# Builds a *separate* Debug+coverage image (via --build-arg) so the
# release-ish image produced by build.yml stays unaffected. The runtime
# steps then drive ctest with `--device=nvidia.com/gpu=all` (CDI; the
# runner's docker maps the legacy `--gpus all` flag to a CDI lookup
# that spuriously demands an AMD spec, so we go to CDI directly), run
# a Python smoke test against the editable install, invoke gcovr to
# emit Cobertura XML + HTML detail, and push the XML to Codecov via
# codecov-cli — all in one container so the .gcda files written by
# ctest are still around for gcovr.
#
# codecov-cli runs *inside* the container because the runner host is
# NixOS and the upstream codecov/codecov-action ships a generic-linux
# binary that NixOS can't exec.

name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Per-workflow group keyed by ref (see #66).
concurrency:
  group: gpu-runner-test-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    # Self-hosted runner with a GPU exposed via CDI
    # (`docker run --device=nvidia.com/gpu=all`) and docker on PATH.
    runs-on: [self-hosted, gpu]
    timeout-minutes: 15

    env:
      # Image tag derived from the SHA so concurrent runs don't trample
      # each other. `-cov` keeps it visually distinct from the release
      # image produced by build.yml.
      IMAGE: damacy:${{ github.sha }}-cov
      CONTAINER: damacy-cov-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build docker image (Debug + coverage)
        timeout-minutes: 5
        run: |
          docker build \
            --build-arg CMAKE_BUILD_TYPE=Debug \
            --build-arg DAMACY_COVERAGE=ON \
            --tag "$IMAGE" .

      - name: Run ctest + Python smoke + gcovr + codecov upload
        timeout-minutes: 5
        # Single named (no --rm) container so .gcda files from ctest
        # survive for gcovr in the same invocation, and so the HTML
        # report is `docker cp`-able afterwards. CODECOV_TOKEN +
        # GITHUB_* env are forwarded into the container so codecov-cli
        # can attribute the upload to this run.
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          # On pull_request events GITHUB_SHA is the merge commit;
          # codecov wants the PR head. Fall back to GITHUB_SHA on push.
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          docker run --name "$CONTAINER" --device=nvidia.com/gpu=all \
            -e CODECOV_TOKEN \
            -e COMMIT_SHA \
            -e GITHUB_ACTIONS \
            -e GITHUB_REF \
            -e GITHUB_SHA \
            -e GITHUB_HEAD_REF \
            -e GITHUB_REPOSITORY \
            -e GITHUB_RUN_ID \
            -e GITHUB_WORKFLOW \
            "$IMAGE" \
            bash -c '
              set -e
              ctest --output-on-failure --test-dir build
              python3 -c "import damacy; print(\"damacy\", damacy.__version__); damacy._native.set_log_quiet(True); print(\"api-ok\")"
              mkdir -p coverage-html
              # gcc bug 68080: atomic ops produce negative branch counts.
              gcovr --root . \
                --xml-pretty --output coverage.xml \
                --html-details coverage-html/index.html \
                --exclude ".*/tests/.*" \
                --exclude ".*/experiments/.*" \
                --exclude ".*/build/.*" \
                --gcov-ignore-parse-errors=negative_hits.warn \
                --print-summary
              if [ -z "${CODECOV_TOKEN:-}" ]; then
                echo "ERROR: CODECOV_TOKEN not set" >&2
                exit 1
              fi
              # --git-service github works around a codecov-cli bug where
              # CI auto-detection lands as service=None in the create-commit
              # validation call, even though "github-actions" is detected.
              # --sha is passed explicitly because the GHA adapter shells
              # out to `git rev-parse` for PRs (to unwrap the merge commit),
              # but the image has neither git nor a .git tree.
              # No `|| true` — a failed upload fails the job, so codecov
              # outages are visible instead of silently green.
              codecovcli --auto-load-params-from GithubActions \
                upload-process \
                --git-service github \
                --sha "$COMMIT_SHA" \
                --file coverage.xml --flag unittests
            '

      - name: Extract coverage HTML
        # Always-run so we still grab whatever gcovr produced even if a
        # prior step inside the container failed.
        if: always()
        run: |
          docker cp "$CONTAINER":/workspace/damacy/coverage-html ./coverage-html || true
          docker rm "$CONTAINER" || true

      - name: Upload coverage HTML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-${{ github.sha }}
          path: coverage-html/
          retention-days: 14
          if-no-files-found: warn
